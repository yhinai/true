name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install project
        run: uv sync --extra dev

      - name: Run pytest
        run: uv run --extra dev pytest -q

      - name: Run curated compare smoke
        run: ./scripts/run_compare.sh --json >/tmp/cbc-compare.json

      - name: Refresh checked-in examples
        run: uv run --extra dev python3 scripts/refresh_examples.py >/tmp/cbc-refresh.json

      - name: Check contract snapshots are clean
        run: git diff --exit-code -- artifacts/examples reports/examples
