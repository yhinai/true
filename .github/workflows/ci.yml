name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate App token
        id: app-token
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CBC_BOT_APP_ID }}
          private-key: ${{ secrets.CBC_BOT_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install project
        run: uv sync --extra dev

      - name: Run pytest
        run: uv run --extra dev pytest -q

      - name: Run curated compare smoke
        run: ./scripts/run_compare.sh --json >/tmp/cbc-compare.json

      - name: Refresh checked-in examples
        run: uv run --extra dev python3 scripts/refresh_examples.py >/tmp/cbc-refresh.json

      - name: Auto-commit refreshed snapshots on PR branches
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          # App-installation token so the push re-triggers CI (GITHUB_TOKEN pushes do not)
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if ! git diff --quiet -- artifacts/examples reports/examples; then
            git config user.name  "cbc-auto-refresh[bot]"
            git config user.email "cbc-auto-refresh[bot]@users.noreply.github.com"
            git add artifacts/examples reports/examples
            git commit -m "chore: refresh example snapshots"
            if [ -n "${GH_APP_TOKEN}" ]; then
              git remote set-url origin "https://x-access-token:${GH_APP_TOKEN}@github.com/${{ github.repository }}.git"
              echo "Using App token so push re-triggers CI."
            else
              echo "No App token; falling back to default. Push will not re-trigger CI."
            fi
            git push origin HEAD:${{ github.head_ref }}
          else
            echo "Snapshots are clean."
          fi

      - name: Warn on unclean snapshots (main push)
        if: github.event_name == 'push'
        run: |
          if ! git diff --quiet -- artifacts/examples reports/examples; then
            echo "::warning::Example artifacts drifted on main — this should normally be fixed via PR auto-refresh. Pushing a corrective PR may be needed if drift persists."
            git diff --stat -- artifacts/examples reports/examples
          else
            echo "Snapshots are clean on main."
          fi

      - name: Fail on unclean snapshots (fork PR)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: git diff --exit-code -- artifacts/examples reports/examples
