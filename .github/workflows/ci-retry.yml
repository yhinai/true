name: CI Retry on Failure

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  actions: write
  contents: read

jobs:
  retry:
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt == 1
    steps:
      - name: Re-run failed jobs (first attempt only)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          echo "Re-running failed jobs for CI run $RUN_ID (attempt 1 failed)"
          gh api repos/$REPO/actions/runs/$RUN_ID/rerun-failed-jobs \
               --method POST \
               -H "Accept: application/vnd.github+json"
