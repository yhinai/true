name: LLM conflict resolver

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - name: Generate App token
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.CBC_BOT_APP_ID }}
          private-key: ${{ secrets.CBC_BOT_APP_PRIVATE_KEY }}

      - name: Check secrets present
        id: gate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "No Gemini key; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repo
        if: steps.gate.outputs.skip == 'false'
        uses: actions/checkout@v6

      - name: Set up Python
        if: steps.gate.outputs.skip == 'false'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup uv
        if: steps.gate.outputs.skip == 'false'
        uses: astral-sh/setup-uv@v7

      - name: Install deps
        if: steps.gate.outputs.skip == 'false'
        run: |
          pip install google-genai requests

      - name: Resolve conflicts via Gemini
        if: steps.gate.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REPO: ${{ github.repository }}
        run: |
          python3 scripts/llm_resolve_conflicts.py
