name: LLM PR reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    # Skip auto-refresh and bot commits to avoid spam
    if: >
      github.event.pull_request.head.repo.full_name == github.repository &&
      !contains(github.event.pull_request.title, 'chore: refresh example snapshots')
    runs-on: ubuntu-latest
    steps:
      - name: Check secret present
        id: gate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "No OpenAI key; skipping review."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.gate.outputs.skip == 'false'
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        if: steps.gate.outputs.skip == 'false'
        with:
          python-version: "3.11"

      - name: Install OpenAI SDK
        if: steps.gate.outputs.skip == 'false'
        run: pip install openai

      - name: Generate App token
        id: app-token
        if: steps.gate.outputs.skip == 'false'
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.CBC_BOT_APP_ID }}
          private-key: ${{ secrets.CBC_BOT_APP_PRIVATE_KEY }}

      - name: Run reviewer
        if: steps.gate.outputs.skip == 'false'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: python3 scripts/llm_pr_reviewer.py
