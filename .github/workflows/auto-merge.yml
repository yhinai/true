name: Auto-merge

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled, unlabeled]
  check_suite:
    types: [completed]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event.check_suite.conclusion == 'success'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
        run: |
          # List open PRs from this repo (same-repo only; skip forks for safety).
          # Pass --repo explicitly so we don't need a local checkout.
          PRS=$(gh pr list --repo "$REPO" --state open --base main \
                  --json number,headRepositoryOwner \
                  --jq ".[] | select(.headRepositoryOwner.login == \"$OWNER\") | .number")
          for PR in $PRS; do
            gh pr merge --repo "$REPO" --auto --squash "$PR" || true
          done
