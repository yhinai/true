task_id: title_case_bug_codex
title: Fix title casing helper with live Codex
prompt: |
  normalize_title should capitalize each word in the incoming title.
  Update only formatter.py so that the test passes.
workspace: ../title_case_bug/workspace
allowed_files:
  - formatter.py
required_checks:
  - pytest
doubt_points:
  - Avoid touching the test.
oracles:
  - name: pytest
    kind: pytest
    command: -q
adapter: codex
codex:
  model: gpt-5.4
  sandbox: workspace-write
  config_overrides:
    - model_reasoning_effort="medium"
  skip_git_repo_check: true
  dangerously_bypass_approvals: false
retry_budget: 2
tags:
  - python
  - codex
  - live
