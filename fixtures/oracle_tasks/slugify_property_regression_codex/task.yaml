task_id: slugify_property_regression_codex
title: Fix slugify and capture a regression test from a failing property case with live Codex
prompt: |
  slugify should produce lowercase slugs with single hyphen separators and remain idempotent.
  Update only slugify.py so the unit test passes and the configured property cases hold.
workspace: ../slugify_property_regression/workspace
allowed_files:
  - slugify.py
required_checks:
  - pytest
  - hypothesis
doubt_points:
  - Keep the implementation minimal.
oracles:
  - name: pytest
    kind: pytest
    command: -q
adapter: codex
hypothesis:
  path: property_checks.py
  function: assert_slugify_properties
  cases:
    - Hello World
    - Hello  World
    - Already-Slugged
    - MiXeD   Case Value
  artifact_name: slugify_counterexample.json
  regression_test_path: test_slugify_property_regression.py
codex:
  model: gpt-5.4
  sandbox: workspace-write
  config_overrides:
    - model_reasoning_effort="medium"
  skip_git_repo_check: true
  dangerously_bypass_approvals: false
retry_budget: 2
tags:
  - python
  - codex
  - live
