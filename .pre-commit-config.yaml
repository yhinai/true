# Pre-commit hooks for CBC.
# Install once per clone:
#   uv tool install pre-commit
#   pre-commit install
#
# Run manually on all files:
#   pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff check
        entry: uv run --with ruff ruff check
        language: system
        types: [python]
        pass_filenames: true
        exclude: ^(fixtures/|artifacts/)

      - id: pytest-fast
        name: pytest (fast suite)
        entry: uv run --extra dev pytest tests/ -m "not slow" -x -q
        language: system
        pass_filenames: false
        stages: [pre-commit]
